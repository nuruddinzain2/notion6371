<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    body {
      position: fixed;
      inset: 0;
    }

    iframe {
      height: 100vh;
      width: 100%;
      height: 100dvh;
      width: 100dvw;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: none;
      display: block;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Loading overlay - menutupi header Google */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #6b7280;
      font-size: 14px;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      iframe {
        height: 100dvh;
        width: 100dvw;
      }
    }
  </style>
</head>
<body>
  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Memuat dashboard...</div>
  </div>

  <!-- Iframe dengan parameter embed -->
  <iframe
    id="dashboardFrame"
    src="https://script.google.com/macros/s/AKfycbyE36-M301GBgZgQL54EoPHV6XKk70NY4CWBedTDKdZeTr8dtkOb1oPhEXB6g2WadFn/exec?embed=true"
    allow="fullscreen; accelerometer; gyroscope; autoplay"
    allowfullscreen
    scrolling="auto">
  </iframe>

  <script>
    const overlay = document.getElementById('loadingOverlay');
    const frame = document.getElementById('dashboardFrame');

    // Sembunyikan overlay setelah iframe selesai load
    frame.addEventListener('load', function() {
      setTimeout(function() {
        overlay.classList.add('hidden');
      }, 500);
    });

    // Fallback: sembunyikan overlay setelah 3 detik jika load event tidak terpicu
    setTimeout(function() {
      overlay.classList.add('hidden');
    }, 3000);

    // Fix viewport height untuk iOS
    function setViewportHeight() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', vh + 'px');
    }
    setViewportHeight();
    window.addEventListener('resize', setViewportHeight);
    window.addEventListener('orientationchange', function() {
      setTimeout(setViewportHeight, 200);
    });
  </script>
</body>
</html>
