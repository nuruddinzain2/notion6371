<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYIUR - Isi Tugas Harian</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #f4f6f8;
  }
  #nyiurFrame {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
  }
  #loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f4f6f8;
    font-size: 16px;
    color: #555;
    z-index: 1;
  }
</style>
</head>
<body>

  <div id="loading">Memuat form...</div>

  <iframe
    id="nyiurFrame"
    src="https://script.google.com/macros/s/AKfycbyE36-M301GBgZgQL54EoPHV6XKk70NY4CWBedTDKdZeTr8dtkOb1oPhEXB6g2WadFn/exec"
    onload="document.getElementById('loading').style.display='none'"
    allow="clipboard-read; clipboard-write"
  ></iframe>

</body>
</html>
